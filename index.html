<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | ZapLanches</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #15ff00;
            --gold: #2cdb00;
            --dark-bg: #0a0a0b;
            --card-bg: #161618;
            --surface: #212124;
            --text: #ffffff;
            --green: #22c55e;
            --blue: #3b82f6;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d30;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .logo span {
            color: var(--primary);
        }

        .tab-container {
            display: flex;
            justify-content: center;
            background: var(--card-bg);
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            padding: 15px 25px;
            border: none;
            background: none;
            color: #888;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
        }

        .tab-content {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        .grid-mesas {
            display: grid;
            /* No mobile: 2 colunas iguais (1fr 1fr). No desktop: colunas de 220px */
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            /* Reduzi um pouco o espaço para caber melhor em telas pequenas */
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Ajuste para telas maiores (Desktop) */
        @media (min-width: 600px) {
            .grid-mesas {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 20px;
            }
        }

        .mesa-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .mesa-card.aberta {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .mesa-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .mesa-itens-lista {
            flex-grow: 1;
            font-size: 0.8rem;
            color: #aaa;
            text-align: left;
            margin: 10px 0;
            max-height: 150px;
            overflow-y: auto;
        }

        .mesa-item-doc {
            border-bottom: 1px solid #222;
            padding: 4px 0;
        }

        .garcom-tag {
            font-size: 0.7rem;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--gold);
        }

        #menu-lateral {
            position: fixed;
            right: -420px;
            top: 0;
            width: 400px;
            height: 100%;
            background: #111;
            z-index: 2000;
            transition: 0.4s;
            padding: 20px;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
            border-left: 1px solid var(--gold);
            overflow-y: auto;
        }

        #menu-lateral.active {
            right: 0;
        }

        .cat-head {
            width: 100%;
            padding: 12px;
            background: #222;
            border: none;
            color: white;
            text-align: left;
            font-weight: 800;
            margin-top: 5px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .hidden {
            display: none;
        }

        .btn-confirm {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 12px;
            background: var(--gold);
            color: #000;
            font-weight: 800;
            cursor: pointer;
        }

        .btn-nav {
            background: var(--surface);
            border: 1px solid #3f3f46;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .item-carrinho {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid var(--gold);
        }

        .obs-item-input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #00ff00;
            padding: 5px;
            font-size: 0.75rem;
            border-radius: 4px;
            margin-top: 5px;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .order-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2d2d30;
            border-left: 5px solid var(--primary);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Escurece o fundo e desfoca as outras mesas */
        body.mesa-em-foco::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1500;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s;
        }

        /* Destaca a mesa ativa */
        .mesa-card.em-destaque {
            position: relative;
            z-index: 1600;
            transform: scale(1.05);
            border-color: var(--primary) !important;
            box-shadow: 0 0 30px rgba(21, 255, 0, 0.4);
            animation: pulseHighlight 2s infinite;
        }

        @keyframes pulseHighlight {
            0% {
                box-shadow: 0 0 20px rgba(21, 255, 0, 0.3);
            }

            50% {
                box-shadow: 0 0 40px rgba(21, 255, 0, 0.6);
            }

            100% {
                box-shadow: 0 0 20px rgba(21, 255, 0, 0.3);
            }
        }
        /* Container para posicionar o olho sobre o input */
.swal2-input-container {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
}

.toggle-password-icon {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #888;
    z-index: 10;
    padding: 10px;
}
/* Container da Grade */
.atendentes-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 colunas */
    gap: 15px;
    padding: 20px 10px;
}

/* Botão Individual do Atendente */
.atendente-btn {
    background: #212124;
    border: 2px solid #333;
    border-radius: 12px;
    padding: 15px;
    color: white;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: all 0.3s ease;
}

.atendente-btn:hover {
    border-color: var(--gold);
    background: #2a2a2d;
    transform: translateY(-3px);
}

/* Avatar com a Inicial */
.atendente-avatar {
    width: 30px;
    height: 30px;
    background: var(--gold);
    color: black;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 20px;
    margin-bottom: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.atendente-btn span {
    font-weight: 600;
    font-size: 14px;
}

/* Responsividade para telas menores */
@media (max-width: 400px) {
    .atendentes-grid {
        grid-template-columns: 1fr;
    }
}
/* Grid de Pagamento no SweetAlert */
.pagamento-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-top: 10px;
}

.pgt-btn {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 15px 25px;
    background: #2a2a2a;
    border: 2px solid #444;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
}

.pgt-btn:hover {
    background: #333;
    border-color: var(--green);
    transform: scale(1.02);
}

.pgt-btn i {
    font-size: 1.5rem;
    margin-right: 20px;
    color: var(--green);
}

.pgt-btn span {
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 1px;
}

/* No celular, os botões ficam um pouco menores para caber melhor */
@media (max-width: 480px) {
    .pgt-btn { padding: 12px 20px; }
}
/* Área de rolagem para não esticar o celular */
.modal-scroll-area {
    max-height: 60vh;
    overflow-y: auto;
    padding-right: 5px;
}

/* Customização da barra de rolagem */
.modal-scroll-area::-webkit-scrollbar { width: 5px; }
.modal-scroll-area::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

.linha-add {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #222;
}

.info-add { display: flex; flex-direction: column; text-align: left; }
.nome-add { font-weight: bold; color: #fff; font-size: 0.95rem; }
.preco-add { color: var(--gold); font-size: 0.85rem; }

.controles-add { display: flex; align-items: center; gap: 15px; }

.btn-menor, .btn-maior {
    width: 32px; height: 32px;
    border-radius: 50%; border: none;
    font-size: 1.2rem; font-weight: bold;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.btn-menor { background: #444; color: #fff; }
.btn-maior { background: var(--green); color: #fff; }

.qtd-numero { font-weight: bold; font-size: 1.1rem; min-width: 20px; text-align: center; }

/* Grid de remoção simplificado */
.grid-remocao {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
}
.item-rem {
    background: #222; padding: 8px; border-radius: 5px; font-size: 0.85rem;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.check-rem { transform: scale(1.2); }
.swal2-container {
    z-index: 99999 !important;
}
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore,
            initializeFirestore,
            memoryLocalCache,
            collection,
            onSnapshot,
            query,
            orderBy,
            doc,
            updateDoc,
            deleteDoc,
            getDocs,
            setDoc,
            addDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDRj1Cj0o1z9u7fS9InPlSlqvmcetMmMUU",
            authDomain: "hamb1-2733f.firebaseapp.com",
            projectId: "hamb1-2733f",
            storageBucket: "hamb1-2733f.firebasestorage.app",
            messagingSenderId: "244052884947",
            appId: "1:244052884947:web:2c6df704023493fe8e4326"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { localCache: memoryLocalCache() });

        const _0x4f22 = "emFwMjAyNkA=";
        const checkPass = (p) => btoa(p) === _0x4f22;

        const cardapio = {
            "🥪 ARTESANAIS": [
                { n: "Burguer Mini", p: 21.00 },
                { n: "Burguer Classic", p: 22.00 },
                { n: "Burguer Poleguinho", p: 23.00 },
                { n: "Burguer Pepperoni", p: 25.00 },
                { n: "Burguer Cheese Bacon", p: 26.00 },
                { n: "Burguer Double", p: 32.00 }
            ],
            "🍔 TRADICIONAIS": [
                { n: "Zap Quente", p: 6.00 },

            ],
           
        };

        const garcons = ["Robson", "Sarah", "Vanilza", "Vitória",];
        let mesas = [], mesaAtiva = null, carrinhoTemp = [], somAtivo = false, inicializado = false;

        async function initMesas() {
            const snap = await getDocs(collection(db, "estado_mesas"));
            if (snap.empty) {
                for (let i = 1; i <= 10; i++) {
                    await setDoc(doc(db, "estado_mesas", `mesa_${i}`), { n: i, aberta: false, itens: [], total: 0, garcom: '' });
                }
            }
        }
        initMesas();

        window.toggleSom = () => {
            somAtivo = !somAtivo;
            document.getElementById('som-icon').className = somAtivo ? "fas fa-bell" : "fas fa-bell-slash";
        };

        function playSom() {
            if (!somAtivo) return;
            const audio = document.getElementById('audio-bip');
            if (audio) { audio.currentTime = 0; audio.play().catch(() => { }); }
        }

        window.switchTab = (btn) => {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(btn.getAttribute('data-target')).classList.add('active');
            btn.classList.add('active');
        };

       document.getElementById('tab-caixa-btn').onclick = async function() {
    const { value: pass } = await Swal.fire({
        title: 'Acesso Restrito',
        input: 'password',
        inputPlaceholder: 'Senha do Gerente',
        inputAttributes: { autocapitalize: 'off', autocorrect: 'off' },
        showCancelButton: true,
        didOpen: () => {
            // Cria o ícone do olho
            const input = Swal.getInput();
            const icon = document.createElement('i');
            icon.classList.add('fas', 'fa-eye', 'toggle-password-icon');
            
            // Insere o ícone após o input
            input.parentElement.style.position = 'relative';
            input.parentElement.appendChild(icon);

            // Lógica de clicar no olho
            icon.onclick = () => {
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            };
        }
    });

    if (checkPass(pass)) { 
        switchTab(this); 
    } else if (pass) { 
        Swal.fire('Erro', 'Senha Incorreta!', 'error'); 
    }
};

        window.toggleMenu = (s) => document.getElementById('menu-lateral').classList.toggle('active', s);

    const container = document.getElementById('container-mesas');
    if (!container) return;
    
    container.innerHTML = mesas.map(m => `
    <div class="mesa-card ${m.aberta ? 'aberta' : ''}" style="position: relative; min-height: 180px; display: flex; flex-direction: column;">
        
        ${m.aberta ? `
            <button onclick="window.cancelarMesa(${m.n})" 
                style="position:absolute; top:12px; right:12px; background:rgba(239, 68, 68, 0.15); border:none; color:#ef4444; width:30px; height:30px; border-radius:50%; cursor:pointer; z-index:10; display:flex; align-items:center; justify-content:center;">
                <i class="fas fa-times"></i>
            </button>
        ` : ''}

        <div class="mesa-header" style="display: flex; flex-direction: column; align-items: flex-start; gap: 4px; margin-bottom: 12px;">

            ${m.aberta ? `
                <span class="garcom-tag" style="font-size: 0.75rem; padding: 2px 8px; background: #333; border-radius: 4px; color: var(--gold); border: 1px solid rgba(255,215,0,0.2);">

            ` : '<span style="font-size: 0.75rem; color: #666;">Disponível</span>'}
        </div>

        <div class="mesa-itens-lista" style="flex-grow: 1;">
            ${m.aberta ? (Array.isArray(m.itens) && m.itens.length > 0 ? m.itens.map(i => `
                <div class="mesa-item-doc">
                    <b>${i.q}x</b> ${i.n} 
                    <br><small style="color:var(--green)">${i.obs || ''}</small>
                </div>`).join('') : '<div style="color:#555; font-style:italic; font-size:0.9rem;">Mesa vazia...</div>') : ''}
        </div>
        
        <div style="font-weight:bold; margin: 10px 0; color:var(--gold); font-size: 1.1rem;">
            ${m.aberta ? 'R$ ' + parseFloat(m.total || 0).toFixed(2) : ''}
        </div>

        ${!m.aberta ?
            `<button class="btn-confirm" onclick="abrirMesa(${m.n})">ABRIR MESA</button>` :
            `<div class="row-btns" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <button class="btn-confirm" style="background:#2a2a2a; color: white; font-size: 20px; border: 1px solid #444;" onclick="prepararAdd(${m.n})">+</button>
                <button class="btn-confirm" style="background:green; color: white; font-size: 25px" onclick="fecharMesa(${m.n})">✔︎</button>
            </div>`
        }

       window.enviarCozinha = async () => {

    Swal.showLoading();

    carrinhoTemp.forEach(novo => {

        } else { 
            novosItensMesa.push({ ...novo }); 
        }
    });

    const novoTotal = novosItensMesa.reduce((a, b) => a + (b.p * b.q), 0);

    // 2. Grava no banco de dados
    try {
        await updateDoc(doc(db, "estado_mesas", `mesa_${mesaAtiva}`), {
            itens: novosItensMesa,

        });

  document.addEventListener('keydown', function (event) {
    if (event.ctrlKey && event.shiftKey && event.key === 'I') { event.preventDefault(); }
  });
  document.addEventListener('contextmenu', function (event) { event.preventDefault(); });
    </script>
</body>

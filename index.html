window.iniciarEscutaVoz = function() {
    const btn = document.getElementById('btnVozMenu');
    const textoCapturado = document.getElementById('textoCapturado');
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!Recognition) return alert("Navegador sem suporte.");

    const rec = new Recognition();
    rec.lang = 'pt-BR';
    rec.continuous = true; // Permite falar várias coisas
    rec.interimResults = true; // Ouve em tempo real, mas vamos filtrar no final

    rec.onstart = () => {
        btn.innerText = "🛑 OUVINDO... (FALE E PARE)";
        btn.style.background = "#2ed573";
        textoCapturado.innerText = "Pode falar o pedido completo...";
    };

    rec.onresult = (event) => {
        // 1. Pega tudo o que foi falado até agora na frase atual
        let falaCompleta = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            falaCompleta += event.results[i][0].transcript;
        }

        textoCapturado.innerText = "Processando: " + falaCompleta;

        // 2. REGRAS DE OURO: Limpa o cronômetro toda vez que você fala algo novo
        clearTimeout(timerVoz);

        // 3. Só processa DE VERDADE após 1.2 segundos de silêncio total
        timerVoz = setTimeout(() => {
            processarComandoVozFinal(falaCompleta.toLowerCase());
            rec.stop(); // Para o microfone após o pedido ser entendido
        }, 1200);
    };

    rec.onend = () => {
        btn.innerText = "CLIQUE PARA FALAR";
        btn.style.background = "#ff4757";
    };

    rec.start();
};

function processarComandoVozFinal(texto) {
    const fala = texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    let itensDetectadosNestaFrase = new Set(); 

    // Mapa de números por extenso para converter em algarismos
    const numerosExtenso = { "um": 1, "dois": 2, "tres": 3, "quatro": 4, "cinco": 5 };

    Object.keys(cardapio).forEach(categoria => {
        cardapio[categoria].forEach(produto => {
            const nomeProdOriginal = produto.n.toLowerCase();
            const nomeProdLimpo = nomeProdOriginal.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            if ((fala.includes(nomeProdLimpo) || nomeProdLimpo.includes(fala)) && !itensDetectadosNestaFrase.has(produto.n)) {
                
                // --- LÓGICA DE QUANTIDADE ---
                let quantidade = 1; // Padrão é 1
                
                // Tenta encontrar um número encostado no nome do produto (ex: "2 zap" ou "dois zap")
                const palavras = fala.split(" ");
                const indexProduto = palavras.findIndex(p => nomeProdLimpo.includes(p));
                
                if (indexProduto > 0) {
                    const termoAnterior = palavras[indexProduto - 1];
                    // Verifica se é número (2) ou extenso (dois)
                    if (!isNaN(termoAnterior)) {
                        quantidade = parseInt(termoAnterior);
                    } else if (numerosExtenso[termoAnterior]) {
                        quantidade = numerosExtenso[termoAnterior];
                    }
                }
                // ----------------------------

                const preco = parseFloat(produto.p) || 0;
                const itemNoCarrinho = carrinhoTemp.find(i => i.n === produto.n);

                if (itemNoCarrinho) {
                    itemNoCarrinho.q += quantidade; // Adiciona a quantidade falada
                } else {
                    carrinhoTemp.push({
                        n: produto.n,
                        p: preco,
                        q: quantidade,
                        obs: ""
                    });
                }

                itensDetectadosNestaFrase.add(produto.n);
                console.log(`✅ Reconhecido: ${quantidade}x ${produto.n}`);
            }
        });
    });

    if (itensDetectadosNestaFrase.size > 0) {
        document.getElementById('audio-bip').play().catch(() => {});
        document.getElementById('textoCapturado').innerText = "✅ Itens adicionados!";
        if (typeof atualizarCarrinho === "function") {
            atualizarCarrinho(); 
        }
    } else {
        document.getElementById('textoCapturado').innerText = "❓ Não achei: '" + texto + "' no menu.";
    }
}

window.removerItemEspecifico = async (pedidoId, indexItem) => {
    if (!confirm("Deseja remover este item e atualizar o total?")) return;

    try {
        const pedidoRef = doc(db, "pedidos", pedidoId);
        const snapshot = await getDoc(pedidoRef);
        
        if (snapshot.exists()) {
            const dados = snapshot.data();
            let itensAtualizados = [...dados.itens];
            
            // Pega o item para calcular quanto subtrair do total
            const item = itensAtualizados[indexItem];
            const valorSubtrair = parseFloat(item.p || 0) * parseInt(item.q || 0);
            
            // Remove o item do array
            itensAtualizados.splice(indexItem, 1);
            
            // Recalcula o total (evitando números negativos)
            const novoTotal = Math.max(0, parseFloat(dados.total || 0) - valorSubtrair).toFixed(2);

            // Se não sobrar nenhum item, talvez você queira deletar o pedido, 
            // mas aqui apenas atualizaremos para lista vazia:
            await updateDoc(pedidoRef, {
                itens: itensAtualizados,
                total: novoTotal
            });
            
            console.log("Item removido com sucesso!");
        }
    } catch (error) {
        console.error("Erro:", error);
        alert("Erro ao remover item: " + error.message);
    }
};

      window.gerarPDFBalanco = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const pix = document.getElementById('b-pix').innerText;
    const cartao = document.getElementById('b-cartao').innerText;
    const dinheiro = document.getElementById('b-dinheiro').innerText;
    const total = document.getElementById('b-total').innerText;
    const dataHora = new Date().toLocaleString('pt-BR');

    // 1. CABEÇALHO
    doc.setFillColor(22, 22, 24);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(34, 197, 94);
    doc.setFontSize(22);
    doc.setFont("helvetica", "bold");
    doc.text("ZAPLANCHE - BALANÇO DE CAIXA", 15, 25);
    doc.setFontSize(10);
    doc.setTextColor(150, 150, 150);
    doc.text(`Relatório gerado em: ${dataHora}`, 15, 33);

    // 2. TABELA FINANCEIRA
    doc.autoTable({
        startY: 50,
        head: [['Descrição', 'Valor Acumulado']],
        body: [
            ['Total em PIX', pix],
            ['Total em CARTÃO', cartao],
            ['Total em DINHEIRO', dinheiro],
            [
                { content: 'TOTAL GERAL', styles: { fontStyle: 'bold', fillColor: [34, 197, 94], textColor: [0, 0, 0] } },
                { content: total, styles: { fontStyle: 'bold', fillColor: [34, 197, 94], textColor: [0, 0, 0] } }
            ]
        ],
        theme: 'grid',
        headStyles: { fillColor: [33, 33, 36] },
        styles: { fontSize: 12 }
    });

    // 3. HELPER: coleta itens de um elemento de ranking
    const coletarItens = (elementId) => {
        const rows = [];
        let subtotal = 0;
        const cont = document.getElementById(elementId);
        if (cont) {
            cont.querySelectorAll('div').forEach(el => {
                const texto = el.innerText.trim();
                if (!texto) return;
                const partes = texto.split('R$');
                if (partes.length >= 2) {
                    rows.push([partes[0].trim(), `R$ ${partes[1].trim()}`]);
                    subtotal += parseFloat(partes[1].replace(',', '.')) || 0;
                }
            });
        }
        return { rows, subtotal };
    };

    const artesanais  = coletarItens('ranking-artesanais');
    const tradicionais = coletarItens('ranking-tradicionais');
    const bebidas     = coletarItens('ranking-bebidas');

    let posY = doc.lastAutoTable.finalY + 15;

    // 4. TÍTULO DA SEÇÃO DE LANCHES
    doc.setFontSize(13);
    doc.setTextColor(34, 197, 94);
    doc.setFont("helvetica", "bold");
    doc.text("DETALHAMENTO DE VENDAS POR PRODUTO", 15, posY);
    posY += 8;

    // 5. DUAS COLUNAS LADO A LADO (Artesanais | Tradicionais)
    const colEsq = 14;
    const colDir = 110;
    const larguraCol = 85;

    // Coluna Esquerda — Artesanais
    doc.autoTable({
        startY: posY,
        tableWidth: larguraCol,
        margin: { left: colEsq, right: 0 },
        head: [[' ARTESANAIS', 'Subtotal']],
        body: [
            ...artesanais.rows,
            [
                { content: 'SUBTOTAL', styles: { fontStyle: 'bold', fillColor: [40, 40, 40], textColor: [255, 215, 0] } },
                { content: `R$ ${artesanais.subtotal.toFixed(2)}`, styles: { fontStyle: 'bold', fillColor: [40, 40, 40], textColor: [255, 215, 0] } }
            ]
        ],
        theme: 'striped',
        headStyles: { fillColor: [33, 33, 36], textColor: [34, 197, 94] },
        styles: { fontSize: 9 }
    });

    const fimEsq = doc.lastAutoTable.finalY;

    // Coluna Direita — Tradicionais (mesma linha de início)
    doc.autoTable({
        startY: posY,
        tableWidth: larguraCol,
        margin: { left: colDir, right: 0 },
        head: [[' TRADICIONAIS', 'Subtotal']],
        body: [
            ...tradicionais.rows,
            [
                { content: 'SUBTOTAL', styles: { fontStyle: 'bold', fillColor: [40, 40, 40], textColor: [255, 215, 0] } },
                { content: `R$ ${tradicionais.subtotal.toFixed(2)}`, styles: { fontStyle: 'bold', fillColor: [40, 40, 40], textColor: [255, 215, 0] } }
            ]
        ],
        theme: 'striped',
        headStyles: { fillColor: [33, 33, 36], textColor: [34, 197, 94] },
        styles: { fontSize: 9 }
    });

    const fimDir = doc.lastAutoTable.finalY;

    // Linha divisória vertical entre as colunas
    const fimMaior = Math.max(fimEsq, fimDir);
    doc.setDrawColor(80, 80, 80);
    doc.setLineWidth(0.5);
    doc.line(colDir - 3, posY, colDir - 3, fimMaior);

    // 6. BEBIDAS & PORÇÕES (linha inteira abaixo)
    posY = fimMaior + 10;

    doc.autoTable({
        startY: posY,
        head: [[' BEBIDAS & PORÇÕES', 'Subtotal']],
        body: [
            ...bebidas.rows,
            [
                { content: 'SUBTOTAL', styles: { fontStyle: 'bold', fillColor: [40, 40, 40], textColor: [255, 215, 0] } },
                { content: `R$ ${bebidas.subtotal.toFixed(2)}`, styles: { fontStyle: 'bold', fillColor: [40, 40, 40], textColor: [255, 215, 0] } }
            ]
        ],
        theme: 'striped',
        headStyles: { fillColor: [33, 33, 36], textColor: [34, 197, 94] },
        styles: { fontSize: 9 }
    });

    // 7. SALVAR
    doc.save(`balanco_zaplanche_${dataHora.replace(/[/ :]/g, '_')}.pdf`);
};

                const dados = snap.data();
                let itensAtualizados = [...dados.itens];
                
                // Pega o item para saber o valor a subtrair
                const item = itensAtualizados[indexItem];
                const valorSubtrair = parseFloat(item.p) * parseInt(item.q);
                
                // Remove o item do array
                itensAtualizados.splice(indexItem, 1);
                
                // Recalcula o total
                const novoTotal = Math.max(0, (dados.total || 0) - valorSubtrair);

                await updateDoc(mesaRef, {
                    itens: itensAtualizados,
                    total: novoTotal
                });

                Swal.fire({ title: 'Removido!', icon: 'success', timer: 800, showConfirmButton: false });
            }
        } catch (error) {
            console.error("Erro ao remover item da mesa:", error);
            Swal.fire('Erro', 'Não foi possível remover o item.', 'error');
        }
    }
};
// Bloqueios de segurança
  document.addEventListener('keydown', function (e) {
    if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); }
    if (e.key === 'F12') { e.preventDefault(); }
  });
  document.addEventListener('keydown', function (event) {
    if (event.ctrlKey && event.shiftKey && event.key === 'I') { event.preventDefault(); }
  });
  document.addEventListener('contextmenu', function (event) { event.preventDefault(); });
    </script>
</body>
